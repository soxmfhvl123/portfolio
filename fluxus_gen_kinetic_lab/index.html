<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX-GEN: Kinetic Type Lab v3.0</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tweakpane@3.1.9/dist/tweakpane.min.js"></script>
    <script src="https://unpkg.com/ccapture.js@1.1.0/build/CCapture.all.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flux-theme">
    <div id="app-container">
        <!-- Interactive Viewport -->
        <main id="canvas-container">
            <div id="p5-canvas"></div>
            
            <!-- Progress Overlay -->
            <div id="export-progress-container" style="display: none;">
                <div class="progress-info">
                    <span class="label">RENDERING ENGINE 3.0</span>
                    <span class="value" id="export-percent">0%</span>
                </div>
                <div class="progress-bar-wrap">
                    <div id="progress-fill"></div>
                </div>
            </div>

            <div id="viewport-overlay">
                <div class="status-bar">
                    <span class="status-item"><span class="label">STATUS:</span> <span class="value" id="status-val">READY</span></span>
                    <span class="status-item"><span class="label">FPS:</span> <span class="value" id="fps-val">60</span></span>
                    <span class="status-item"><span class="label">RES:</span> <span class="value" id="res-val">1920x1080</span></span>
                </div>
            </div>
        </main>

        <!-- Right Control Panel -->
        <aside id="control-panel">
            <header class="panel-header">
                <div class="brand">
                    <span class="logo">FLUX-GEN</span>
                    <span class="version">v3.0.0</span>
                </div>
                <button id="fluxus-btn" title="Fluxus Randomizer">RANDOMIZE</button>
            </header>
            <div id="tweakpane-container"></div>
            
            <footer class="panel-footer">
                <input type="file" id="font-input" accept=".ttf,.otf" style="display: none;">
                <button id="generate-output-btn" class="primary-btn" style="display:none;">GENERATE OUTPUT</button>
                <div class="attribution">BY DONG JIN CHOI</div>
            </footer>
        </aside>

        <!-- Timeline Placeholder -->
        <div id="timeline-bar">
            <div class="timeline-track">
                <div class="playhead"></div>
            </div>
        </div>
    </div>

    <!-- Main Logic -->
    <script src="app.js?v=3.0.1"></script>
</body>
</html>
