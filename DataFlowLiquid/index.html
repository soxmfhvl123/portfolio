<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Flow Liquid Art</title>
    <!-- Basic Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body data-scroll>
    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div class="ui-layer" id="ui-layer">
        <h1 class="title">Digital Debris</h1>
        <p class="subtitle">WASD to explore, Center to focus</p>
    </div>

    <!-- Central Crosshair for FPS targeting -->
    <div id="crosshair"></div>

    <!-- Poster Gallery Component -->
    <div id="poster-gallery-container">
        <div id="poster-grid"></div>
    </div>

    <!-- Click to Start Overlay -->
    <div id="instructions">
        <div class="content">
            <span style="font-size:36px">CLICK TO EXPLORE GALAXY</span>
            <br /><br />
            (W, A, S, D = Move, MOUSE = Look)
        </div>
    </div>

    <!-- Central Preview -->
    <div id="poster-preview-container">
        <img id="poster-preview-img" src="" alt="Preview">
    </div>

    <!-- Scroll Spacer to enable browser scrolling -->
    <div class="scroll-spacer" id="scroll-spacer"></div>

    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

    <!-- Three.js CDN Setup -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <!-- Main Application Entry -->
    <script type="module" src="app.js"></script>
</body>

</html>
