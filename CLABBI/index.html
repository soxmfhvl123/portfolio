<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAB Visual Identity Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="grid-overlay"></div>
    <canvas id="canvas-3d"></canvas>

    <aside id="control-panel">
        <div class="panel-header">
            <img src="clab logo.png" alt="CLAB Logo" class="logo">
            <h1>Visual Identity<br>Generator</h1>
        </div>

        <section class="control-group">
            <h2 class="section-title">Stellar Drafting Mode</h2>
            
            <div class="control-item">
                <label>Stellar Selection</label>
                <div class="button-toggle">
                    <button id="star-4pt" class="toggle-btn active" data-type="4pt">4PT Rhombus</button>
                    <button id="star-6pt" class="toggle-btn" data-type="6pt">6PT Crystalline</button>
                </div>
            </div>

            <div class="control-item">
                <label for="star-depth">3D Depth (Intelligence)</label>
                <div class="slider-container">
                    <input type="range" id="star-depth" min="0.1" max="2" step="0.1" value="0.5">
                    <span class="value-display" id="star-depth-val">0.5</span>
                </div>
            </div>

            <div class="control-item">
                <label for="node-count">Node Generation (ASK)</label>
                <div class="slider-container">
                    <input type="range" id="node-count" min="2" max="30" value="10">
                    <span class="value-display" id="node-count-val">10</span>
                </div>
            </div>

            <div class="control-item">
                <label for="connectivity">Line Connection (SHARE)</label>
                <div class="slider-container">
                    <input type="range" id="connectivity" min="0" max="1" step="0.1" value="0.5">
                    <span class="value-display" id="connectivity-val">0.5</span>
                </div>
            </div>
        </section>

        <section class="control-group">
            <h2 class="section-title">Visual Settings</h2>
            <div class="control-item">
                <button id="randomize" class="secondary-btn">Randomize Perspective</button>
            </div>
            <div class="control-item">
                <button id="toggle-grid" class="secondary-btn">Toggle 10px Grid</button>
            </div>
        </section>

        <footer class="panel-footer">
            <button id="export-svg" class="primary-btn">Vector Export (CTA)</button>
        </footer>
    </aside>

    <div id="ui-overlay">
        <div class="coordinate-display">
            X: <span id="coord-x">0</span> / Y: <span id="coord-y">0</span> / Z: <span id="coord-z">0</span>
        </div>
    </div>

    <!-- Scripts -->
    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
          }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
