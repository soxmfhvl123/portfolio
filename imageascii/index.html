<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to ASCII</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Wavy Grid Background Canvas -->
    <canvas id="bgCanvas" class="bg-canvas"></canvas>

    <!-- UI Overlay container -->
    <div class="ui-layer">
        <header class="app-header">
            <h1>IMAGE // ASCII</h1>

            <div class="controls">
                <label for="resolutionSlider" class="control-label">RESOLUTION:</label>
                <input type="range" id="resolutionSlider" min="30" max="200" value="80" class="slider">
                <span id="resValue">80</span>
            </div>
        </header>

        <main class="app-main">
            <!-- Left: Upload/Dropzone -->
            <section class="panel left-panel">
                <div id="dropzone" class="dropzone">
                    <div class="drop-content">
                        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <h2>INPUT SOURCE</h2>
                    </div>
                    <input type="file" id="fileInput" accept="image/*">
                    <img id="imagePreview" src="" alt="Preview" class="hidden">
                </div>
            </section>

            <!-- Right: ASCII Output -->
            <section class="panel right-panel">
                <div class="output-container">
                    <pre id="asciiOutput" class="ascii-art">AWAITING DATA...</pre>
                </div>
                <!-- Action Buttons moved out of flow to not overlay art -->
                <div class="action-bar">
                    <button id="copyBtn" class="btn hidden">COPY RAW ASCII</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Hidden canvas for image processing -->
    <canvas id="hiddenCanvas" class="hidden"></canvas>

    <script src="script.js"></script>
</body>

</html>
